<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creatorPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/resgister.css">
</head>
<body>
   
    <form id="registerForm">
         <h1>Sign in here</h1>
        <label for="name">Name</label>
        <br>
        <input type="text" class="username" id="name" required/>
        <br>
          <label for="email">Email</label>
          <br>
        <input type="text" class="email" id="email" required/>
        <br>
          <label for="password">Password</label>
          <br>
        <input type="password" class="password" id="password" required/>
        <br>
         <button type="submit">Register</button>

          <p id="message"></p> <!-- where success/error will show -->
    </form>
    <script src="js/register.js"></script>
</body>
</html>
